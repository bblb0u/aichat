server:
  # Frontend login keys. Each key maps to a separate user identity.
  access_keys:
    - "user-one-login-key"
    - "user-two-login-key"

  # Set a stable secret in production. JWT_SECRET env var overrides this value.
  jwt_secret: "change-me-jwt-secret"
  jwt_expires_minutes: 43200
  data_path: "data/chat.db"

  # Comma-separated origins are also supported through CORS_ORIGINS env var.
  cors_origins:
    - "*"

providers:
  - id: "openai"
    name: "OpenAI"
    base_url: "https://api.openai.com/v1"
    api_key: "sk-your-openai-api-key"
    models:
      - "gpt-5.5"
      - "gpt-5.4-mini"
    default_model: "gpt-5.5"

  # Add more OpenAI-compatible APIs here.
  # - id: "compatible"
  #   name: "Compatible API"
  #   base_url: "https://api.example.com/v1"
  #   api_key: "your-provider-key"
  #   models:
  #     - "gpt-5.5"
  #     - "provider-chat-model"
  #   default_model: "gpt-5.5"
